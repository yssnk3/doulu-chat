<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>逗鹿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;padding:14px 16px;border-bottom:1px solid #e8e8e8;text-align:center;font-weight:600;font-size:17px;color:#1a1a1a;position:sticky;top:0;z-index:10}
.header span{font-size:12px;font-weight:400;color:#999;display:block;margin-top:2px}
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#95ec69;color:#1a1a1a;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#fff;color:#1a1a1a;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.msg.bot.typing{color:#999}
.sticker{display:inline-block;background:#e8e8e8;border-radius:4px;padding:0 5px;font-size:13px;color:#666;white-space:nowrap}
.input-wrap{background:#fff;border-top:1px solid #e8e8e8;padding:10px 14px;display:flex;gap:10px;align-items:flex-end;position:sticky;bottom:0}
.input-wrap textarea{flex:1;border:1px solid #e0e0e0;border-radius:20px;padding:10px 16px;font-size:15px;resize:none;outline:none;max-height:120px;font-family:inherit;line-height:1.4}
.input-wrap textarea:focus{border-color:#95ec69}
.input-wrap button{width:44px;height:44px;border:none;border-radius:50%;background:#95ec69;color:#1a1a1a;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.input-wrap button:active{background:#7ddb50}
.input-wrap button:disabled{background:#ccc;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  逗鹿
  <span>INTP · 高三艺术生 · 脑回路清奇</span>
</div>
<div class="chat" id="chat"></div>
<div class="input-wrap">
  <textarea id="input" rows="1" placeholder="跟逗鹿说点什么..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()">↑</button>
</div>
<script>
const chat=document.getElementById('chat');
const input=document.getElementById('input');
const btn=document.getElementById('sendBtn');
const sid='session_'+(localStorage.getItem('sid')||Date.now());
localStorage.setItem('sid',sid);
function addMsg(text,role){
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=text.replace(/\[([^\]]+)\]/g,'<span class="sticker">[$1]</span>');
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
const saved=localStorage.getItem('msgs_'+sid);
if(saved){JSON.parse(saved).forEach(m=>addMsg(m.text,m.role))}
else{addMsg('你好京爷，又咋了','bot')}
async function send(){
  const text=input.value.trim();
  if(!text||btn.disabled)return;
  input.value='';input.style.height='auto';
  addMsg(text,'user');
  btn.disabled=true;btn.textContent='…';
  const typing=document.createElement('div');
  typing.className='msg bot typing';typing.textContent='逗鹿正在输入...';
  chat.appendChild(typing);chat.scrollTop=chat.scrollHeight;
  try{
    const resp=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sid,message:text})
    });
    const data=await resp.json();
    typing.remove();
    if(data.reply){addMsg(data.reply,'bot')}
    else{addMsg('（逗鹿走神了：'+data.error+'）','bot')}
  }catch(e){
    typing.remove();
    addMsg('（逗鹿掉线了：'+e.message+'）','bot');
  }
  btn.disabled=false;btn.textContent='↑';
  const msgs=[];
  document.querySelectorAll('.msg:not(.typing)').forEach(el=>msgs.push({text:el.textContent,role:el.className.replace('msg ','')}));
  localStorage.setItem('msgs_'+sid,JSON.stringify(msgs));
}
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});
</script>
</body>
</html>
